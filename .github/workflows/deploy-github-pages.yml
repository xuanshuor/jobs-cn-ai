# 构建后推送到 gh-pages 分支，由 GitHub Pages「从分支部署」托管。
# 首次启用：仓库 Settings → Pages → Source 选「Deploy from a branch」
# → Branch: gh-pages，Folder: / (root)
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# GitHub Actions 自 2026-06 起默认使用 Node 24；提前启用可消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate full job dataset (~206 occupations)
        run: python scripts/generate_embodied_ai_dataset.py

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # 避免 Jekyll 处理静态资源
          enable_jekyll: false
